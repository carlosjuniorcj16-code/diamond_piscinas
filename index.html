<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diamond Piscinas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 text-gray-800">

  <!-- Header -->
  <header class="bg-blue-900 text-white p-6 shadow-lg">
    <h1 class="text-3xl font-bold">Diamond Piscinas</h1>
    <p class="text-sm">Juatuba - MG | Qualidade e sofisticação em piscinas</p>
  </header>

  <!-- Hero Section -->
  <section class="relative h-[400px] flex items-center justify-center text-white">
    <img src="https://pedraredonda.com.br/Piscinas/1894/Piscinas-Construidas-de-Vinil" class="absolute w-full h-full object-cover">
    <div class="relative z-10 bg-black/50 p-6 rounded-xl text-center">
      <h2 class="text-4xl font-bold">Transforme seu espaço</h2>
      <p class="mt-2">Piscinas modernas com o melhor custo-benefício</p>
    </div>
  </section>

  <!-- Produtos -->
  <section class="p-10 grid md:grid-cols-3 gap-6">

    <!-- Card 1 -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <img src="" class="w-full">
      <div class="p-4">
        <h3 class="text-xl font-semibold">Piscina 5x3</h3>
        <p class="text-blue-600 font-bold mt-2">R$ 9.999</p>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <img src="" class="w-full">
      <div class="p-4">
        <h3 class="text-xl font-semibold">Piscina 6x3</h3>
        <p class="text-blue-600 font-bold mt-2">R$ 12.999</p>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <img src="" class="w-full">
      <div class="p-4">
        <h3 class="text-xl font-semibold">Piscina Luxo</h3>
        <p class="text-blue-600 font-bold mt-2">Sob consulta</p>
      </div>
    </div>

  </section>

  <!-- Botão WhatsApp -->
  <a href="https://wa.me/SEUNUMERO" target="_blank"
  class="fixed bottom-6 right-6 bg-green-500 text-white px-6 py-3 rounded-full shadow-lg hover:bg-green-600 transition">
    Falar no WhatsApp
  </a>

  <!-- Footer -->
  <footer class="bg-blue-900 text-white text-center p-4 mt-10">
    <p>© 2026 Diamond Piscinas - Todos os direitos reservados</p>
  </footer>

</body>
</html>
